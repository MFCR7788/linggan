name: Deploy Mobile App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '平台'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  build-ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --no-audit --no-fund

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap sync ios
          sed -i '' 's/\.iOS(\.v1[789])/.iOS(.v16)/g' ios/App/CapApp-SPM/Package.swift

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('ios/App/CapApp-SPM/Package.swift', 'ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ hashFiles('ios/App/CapApp-SPM/Package.swift') }}
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('ios/App/CapApp-SPM/Package.resolved') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Set up Ruby (via mise)
        run: |
          eval "$(mise activate bash)"
          ruby --version
          cd ios && bundle install

      - name: Write App Store Connect API Key
        run: echo "${{ secrets.APPLE_API_KEY_P8 }}" > ios/fastlane/AuthKey_XX5239JSR5.p8

      - name: Import Distribution Certificate
        run: |
          # 导入分发证书到 login keychain
          # login keychain 有完整的 WWDR 中间证书链，identity 验证需要
          echo "${{ secrets.DISTRIBUTION_CERT_P12 }}" | base64 -d > /tmp/distribution.p12
          security import /tmp/distribution.p12 \
            -k ~/Library/Keychains/login.keychain-db \
            -P "${{ secrets.DISTRIBUTION_CERT_PASSWORD }}" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild \
            -T /Applications/Xcode.app/Contents/Developer/usr/bin/codesign \
            -T /Applications/Xcode.app/Contents/Developer/usr/bin/xcodebuild \
            -T /Applications/Xcode.app/Contents/Developer/usr/bin/security
          rm -f /tmp/distribution.p12

          # 重置 keychain 搜索列表（避免之前运行留下的损坏路径）
          security list-keychains -d user -s ~/Library/Keychains/login.keychain-db

          echo "=== Identities ==="
          security find-identity -v -p codesigning

      - name: Diagnostic - check ios directory structure
        run: |
          echo "=== pwd ===" && pwd
          echo "=== ios/ ===" && ls -la ios/
          echo "=== ios/App/ ===" && ls -la ios/App/ || echo "ios/App/ does not exist!"
          echo "=== ios/App/App.xcodeproj ===" && ls -la ios/App/App.xcodeproj || echo "xcodeproj does not exist!"

      - name: Build and upload to TestFlight
        working-directory: ios
        run: |
          eval "$(mise activate bash)"
          xcodebuild -version
          bundle exec fastlane beta
        env:
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          no_proxy: apple.com,icloud.com
          SSL_CERT_FILE: /etc/ssl/cert.pem

  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --no-audit --no-fund

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 -d > android/app/lingji-release.keystore
          cat > android/keystore.properties << PROPS
          storeFile=lingji-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Build and upload to Play Store
        working-directory: android
        run: bundle exec fastlane beta
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/lingji-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY_FILE }}
