name: Deploy Mobile App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '平台'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  build-ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ios

      - name: Configure git auth for Match
        run: git config --global url."https://x-access-token:${{ secrets.MATCH_PASSWORD }}@github.com/".insteadOf "https://github.com/"

      - name: Build and upload to TestFlight
        working-directory: ios
        run: bundle exec fastlane beta
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}

  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 -d > android/app/lingji-release.keystore
          cat > android/app/keystore.properties << PROPS
          storeFile=lingji-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Write Google Play JSON key
        run: echo "${{ secrets.GOOGLE_PLAY_JSON_KEY_FILE }}" > android/google-play-key.json

      - name: Build and upload to Play Store
        working-directory: android
        run: bundle exec fastlane beta
        env:
          GOOGLE_PLAY_JSON_KEY_FILE: google-play-key.json
