name: Deploy Mobile App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '平台'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      build_type:
        description: '构建类型'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  build-ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: |
          npx cap sync ios
          sed -i '' 's/\.iOS(\.v1[789])/.iOS(.v16)/g' ios/App/CapApp-SPM/Package.swift

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: ios

      - name: Configure git auth for Match
        run: git config --global url."https://x-access-token:${{ secrets.MATCH_PASSWORD }}@github.com/".insteadOf "https://github.com/"

      - name: Write App Store Connect API Key
        run: echo "${{ secrets.APPLE_API_KEY_P8 }}" > ios/fastlane/AuthKey_52H698RFZF.p8

      - name: Set up keychain for code signing
        run: |
          security create-keychain -p "" build.keychain-db
          security default-keychain -s build.keychain-db
          security unlock-keychain -p "" build.keychain-db
          security set-keychain-settings -lut 21600 build.keychain-db

      - name: Build and upload to TestFlight
        working-directory: ios
        run: bundle exec fastlane beta
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          MATCH_KEYCHAIN_NAME: "build.keychain-db"
          MATCH_KEYCHAIN_PASSWORD: ""
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}

  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build Next.js (verify only)
        run: npm run build

      - name: Sync Capacitor
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_FILE }}" | base64 -d > android/app/lingji-release.keystore
          cat > android/keystore.properties << PROPS
          storeFile=lingji-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Build and upload to Play Store
        working-directory: android
        run: bundle exec fastlane beta
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/lingji-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY_FILE }}
