name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      - name: Create deploy package
        run: |
          mkdir -p deploy-pkg
          cp -r .next deploy-pkg/
          cp -r public deploy-pkg/
          cp package.json next.config.mjs deploy-pkg/
          # install production-only deps for the package
          cd deploy-pkg
          npm install --omit=dev --prefer-offline --no-audit --no-fund

      - name: Deploy to ECS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy-pkg/*"
          target: "/opt/lingji-new"
          strip_components: 1
          rm: true
          timeout: 300s

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout_minutes: 2
          script: |
            set -e
            # activate swap
            swapon /swapfile 2>/dev/null || true

            # write env file
            cat > /opt/lingji-new/.env.local << 'EOF'
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}
            VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            HEYGEN_API_KEY=${{ secrets.HEYGEN_API_KEY }}
            JINA_API_KEY=${{ secrets.JINA_API_KEY }}
            PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
            PIXABAY_API_KEY=${{ secrets.PIXABAY_API_KEY }}
            UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}
            WECHAT_MP_APP_SECRET=${{ secrets.WECHAT_MP_APP_SECRET }}
            WEIBO_APP_SECRET=${{ secrets.WEIBO_APP_SECRET }}
            EOF

            # swap old and new
            if [ -d /opt/lingji ]; then
              rm -rf /opt/lingji-old 2>/dev/null || true
              mv /opt/lingji /opt/lingji-old
            fi
            mv /opt/lingji-new /opt/lingji

            # restart pm2
            pm2 stop lingji 2>/dev/null || true
            pm2 delete lingji 2>/dev/null || true
            cd /opt/lingji
            pm2 start node_modules/next/dist/bin/next --name lingji -- start -p 3000
            pm2 save

            echo "=== deploy OK ==="
            pm2 list
