name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/lingji
            git pull origin main
            # 同步 env var（运行时敏感配置）
            sed -i 's/^VOLC_TTS_APP_ID=.*/VOLC_TTS_APP_ID=3190895677/' .env.local
            sed -i 's/^VOLC_TTS_ACCESS_TOKEN=.*/VOLC_TTS_ACCESS_TOKEN=Zh6To_wJHre-04fgY-8ttmx2p7jblGsf/' .env.local
            npm ci
            npm run build
            pm2 restart lingji --update-env
            pm2 save
