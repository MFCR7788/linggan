name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止并发部署相互覆盖 node_modules
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout_minutes: 20
          script: |
            set -e  # git + env 阶段失败立即停止
            cd /var/www/lingji
            # 强制同步远程最新代码
            echo "=== git remote ==="
            git remote -v
            echo "=== git fetch + reset ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== git log ==="
            git log --oneline -5
            # 同步 env var（Perl ~ 分隔符，避免 / # 等特殊字符破坏正则）
            write_env_line() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env.local 2>/dev/null; then
                perl -i -pe "s~^${key}=.*~${key}=${val}~" .env.local
              else
                echo "${key}=${val}" >> .env.local
              fi
            }
            write_env_line "VOLC_TTS_APP_ID" "${{ secrets.VOLC_TTS_APP_ID }}"
            write_env_line "VOLC_TTS_ACCESS_TOKEN" "${{ secrets.VOLC_TTS_ACCESS_TOKEN }}"
            write_env_line "CRON_SECRET" "${{ secrets.CRON_SECRET }}"
            write_env_line "ARK_API_KEY" "${{ secrets.ARK_API_KEY }}"
            # 先停应用释放内存
            systemctl stop lingji || true
            # 只删构建缓存，保留 node_modules 避免全量重装 OOM
            rm -rf .next
            # 确保 swap 存在并激活
            if [ ! -f /swapfile ]; then
              echo "=== creating 2G swap ==="
              dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
            elif ! swapon --show 2>/dev/null | grep -q /swapfile; then
              swapon /swapfile
            fi
            free -m
            # 安装编译工具（npm native modules 需要）
            if command -v apt-get &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq build-essential python3
            elif command -v yum &> /dev/null; then
              yum install -y gcc-c++ make python3
            fi
            # 安装 ffmpeg（视频合成需要） — 每次部署都尝试装包管理器版本（idempotent）
            # 优先级：/usr/bin/ffmpeg（包管理器，有 libass 字幕支持） > 静态二进制（无 libass）
            echo "=== ffmpeg setup ==="
            if command -v yum &> /dev/null; then
              # 阿里云 Linux 8 → EPEL + RPM Fusion（已安装时自动跳过/更新）
              yum install -y epel-release 2>/dev/null || true
              yum install -y ffmpeg 2>/dev/null || true
              if [ ! -x /usr/bin/ffmpeg ]; then
                # EPEL 没 ffmpeg → RPM Fusion
                yum install -y --nogpgcheck "https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-8.noarch.rpm" 2>/dev/null || true
                yum install -y ffmpeg 2>/dev/null || true
              fi
            elif command -v apt-get &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq ffmpeg 2>/dev/null || true
            fi
            # 决策：优先用 /usr/bin/ffmpeg（包管理器，支持 libass），删除冲突的静态二进制
            if [ -x /usr/bin/ffmpeg ]; then
              rm -f /usr/local/bin/ffmpeg 2>/dev/null || true
              hash -r 2>/dev/null || true
              FF="/usr/bin/ffmpeg"
              echo "=== using package manager ffmpeg: /usr/bin/ffmpeg ==="
            elif command -v ffmpeg &> /dev/null; then
              FF=$(command -v ffmpeg)
              echo "=== using existing ffmpeg: ${FF} ==="
            else
              # 都没有 → 下载静态二进制（无 libass，字幕功能不可用）
              echo "=== downloading static ffmpeg from GitHub ==="
              curl -sL --connect-timeout 10 --max-time 30 \
                "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
                -o /tmp/ffmpeg.tar.xz 2>/dev/null || true
              if [ -f /tmp/ffmpeg.tar.xz ] && [ -s /tmp/ffmpeg.tar.xz ]; then
                tar -xf /tmp/ffmpeg.tar.xz -C /tmp/
                cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg 2>/dev/null || true
                rm -rf /tmp/ffmpeg.tar.xz /tmp/ffmpeg-master-latest-linux64-gpl
              fi
              chmod +x /usr/local/bin/ffmpeg 2>/dev/null || true
              FF="/usr/local/bin/ffmpeg"
              echo "=== using static ffmpeg (no libass, subtitle rendering disabled) ==="
            fi
            write_env_line "FFMPEG_PATH" "${FF}"
            "${FF}" -version 2>&1 | head -1 || true
            set +e  # npm/build 允许失败，下面有回退逻辑
            # 增量安装（仅变更的依赖），低配 ECS 全量重装会 OOM
            echo "=== npm install ==="
            npm install --prefer-offline --no-audit --no-fund
            INSTALL_EXIT=$?
            if [ $INSTALL_EXIT -eq 0 ]; then
              echo "=== npm run build ==="
              npm run build
              BUILD_EXIT=$?
            else
              BUILD_EXIT=$INSTALL_EXIT
            fi
            if [ $BUILD_EXIT -eq 0 ]; then
              echo "=== build success, restarting lingji ==="
              systemctl restart lingji
            else
              echo "=== build failed (exit $BUILD_EXIT), restarting lingji with previous build ==="
              systemctl start lingji
            fi
            # 安装 crontab 定时任务
            chmod +x scripts/cron-runner.sh
            crontab scripts/ecs-crontab.txt
            echo "=== crontab installed ==="
            crontab -l
          command_timeout: 20m
