name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止并发部署相互覆盖 node_modules
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout_minutes: 20
          script: |
            set -e  # git + env 阶段失败立即停止
            cd /var/www/lingji
            # 强制同步远程最新代码
            echo "=== git remote ==="
            git remote -v
            echo "=== git fetch + reset ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== git log ==="
            git log --oneline -5
            # 同步 env var（运行时敏感配置，不存在则追加）
            grep -q "^VOLC_TTS_APP_ID=" .env.local && sed -i "s#^VOLC_TTS_APP_ID=.*#VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}#" .env.local || echo "VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}" >> .env.local
            grep -q "^VOLC_TTS_ACCESS_TOKEN=" .env.local && sed -i "s#^VOLC_TTS_ACCESS_TOKEN=.*#VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}#" .env.local || echo "VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}" >> .env.local
            grep -q "^CRON_SECRET=" .env.local && sed -i "s#^CRON_SECRET=.*#CRON_SECRET=${{ secrets.CRON_SECRET }}" .env.local || echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env.local
            # 先停应用释放内存
            systemctl stop lingji || true
            # 只删构建缓存，保留 node_modules 避免全量重装 OOM
            rm -rf .next
            # 确保 swap 存在并激活
            if [ ! -f /swapfile ]; then
              echo "=== creating 2G swap ==="
              dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
            elif ! swapon --show 2>/dev/null | grep -q /swapfile; then
              swapon /swapfile
            fi
            free -m
            # 安装 C++ 编译工具（better-sqlite3 原生模块需要）
            if command -v apt-get &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq build-essential python3 ffmpeg
            elif command -v yum &> /dev/null; then
              yum install -y gcc-c++ make python3 ffmpeg
            fi
            # 确保 ffmpeg 路径写入 env
            grep -q "^FFMPEG_PATH=" .env.local || echo "FFMPEG_PATH=$(which ffmpeg)" >> .env.local
            set +e  # npm/build 允许失败，下面有回退逻辑
            # 增量安装（仅变更的依赖），低配 ECS 全量重装会 OOM
            echo "=== npm install ==="
            npm install --prefer-offline --no-audit --no-fund
            INSTALL_EXIT=$?
            if [ $INSTALL_EXIT -eq 0 ]; then
              echo "=== npm run build ==="
              npm run build
              BUILD_EXIT=$?
            else
              BUILD_EXIT=$INSTALL_EXIT
            fi
            if [ $BUILD_EXIT -eq 0 ]; then
              echo "=== build success, restarting lingji ==="
              systemctl restart lingji
            else
              echo "=== build failed (exit $BUILD_EXIT), restarting lingji with previous build ==="
              systemctl start lingji
            fi
            # 安装 crontab 定时任务
            chmod +x scripts/cron-runner.sh
            crontab scripts/ecs-crontab.txt
            echo "=== crontab installed ==="
            crontab -l
          command_timeout: 20m
