name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install --no-audit --no-fund
          ls node_modules/tailwindcss || npm install tailwindcss@^3.4.0
          NODE_ENV=production npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package
        run: |
          mkdir deploy-pkg
          cp -r .next public package.json package-lock.json next.config.mjs deploy-pkg/
          rm -rf deploy-pkg/.next/cache
          tar czf deploy.tar.gz deploy-pkg

      - name: Upload & Deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy.tar.gz \
            --connect-timeout 60 \
            --max-time 600 \
            -w "\nHTTP %{http_code}\n" \
            https://zjsifan.com/api/deploy/upload
