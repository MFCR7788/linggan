name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止并发部署相互覆盖 node_modules
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout_minutes: 20
          script: |
            set -e  # git + env 阶段失败立即停止
            cd /var/www/lingji

            # 辅助函数：写入 .env.local
            write_env_line() {
              local key="$1" val="$2"
              if grep -q "^${key}=" .env.local 2>/dev/null; then
                perl -i -pe "s~^${key}=.*~${key}=${val}~" .env.local
              else
                echo "${key}=${val}" >> .env.local
              fi
            }

            # ===== 阶段 1: 同步代码 + env =====
            echo "=== git sync ==="
            git remote -v
            git fetch origin main
            git reset --hard origin/main
            git log --oneline -5

            write_env_line "VOLC_TTS_APP_ID" "${{ secrets.VOLC_TTS_APP_ID }}"
            write_env_line "VOLC_TTS_ACCESS_TOKEN" "${{ secrets.VOLC_TTS_ACCESS_TOKEN }}"
            write_env_line "CRON_SECRET" "${{ secrets.CRON_SECRET }}"
            write_env_line "ARK_API_KEY" "${{ secrets.ARK_API_KEY }}"

            # ===== 阶段 2: 修正 systemd 服务目录（统一使用 /var/www/lingji）=====
            echo "=== systemd service check ==="
            SERVICE_FILE="/etc/systemd/system/lingji.service"
            if [ -f "$SERVICE_FILE" ]; then
              # 检查是否指向错误目录
              if grep -q '/opt/lingji' "$SERVICE_FILE" 2>/dev/null; then
                echo "Fixing systemd service: /opt/lingji → /var/www/lingji"
                sed -i 's|/opt/lingji|/var/www/lingji|g' "$SERVICE_FILE"
                systemctl daemon-reload
                echo "systemd service updated + daemon-reload done"
              else
                echo "systemd service already points to /var/www/lingji"
              fi
            else
              # 不存在则创建
              echo "Creating systemd service file"
              cat > "$SERVICE_FILE" << 'SERVICEEOF'
            [Unit]
            Description=Lingji Next.js App
            After=network.target

            [Service]
            Type=simple
            User=deploy
            WorkingDirectory=/var/www/lingji
            ExecStart=/usr/bin/npm start
            Restart=always
            RestartSec=3
            Environment=NODE_ENV=production
            Environment=PORT=3000

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF
              systemctl daemon-reload
              systemctl enable lingji
              echo "systemd service created + enabled"
            fi

            # 显示当前 systemd 配置
            grep -E 'WorkingDirectory|ExecStart' "$SERVICE_FILE"

            # ===== 阶段 3: 系统环境准备 =====
            # 先停应用释放内存
            systemctl stop lingji || true

            # 清理残留的 onnxruntime 包
            rm -rf node_modules/onnxruntime-node node_modules/onnxruntime-common 2>/dev/null || true

            # 确保 swap 存在并激活
            if [ ! -f /swapfile ]; then
              echo "=== creating 2G swap ==="
              dd if=/dev/zero of=/swapfile bs=1M count=2048
              chmod 600 /swapfile
              mkswap /swapfile
              swapon /swapfile
            elif ! swapon --show 2>/dev/null | grep -q /swapfile; then
              swapon /swapfile
            fi
            free -m

            # 安装编译工具
            if command -v apt-get &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq build-essential python3
            elif command -v yum &> /dev/null; then
              yum install -y gcc-c++ make python3
            fi

            # 安装 ffmpeg
            echo "=== ffmpeg setup ==="
            if command -v yum &> /dev/null; then
              yum install -y epel-release 2>/dev/null || true
              yum install -y ffmpeg 2>/dev/null || true
              if [ ! -x /usr/bin/ffmpeg ]; then
                yum install -y --nogpgcheck "https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-8.noarch.rpm" 2>/dev/null || true
                yum install -y ffmpeg 2>/dev/null || true
              fi
            elif command -v apt-get &> /dev/null; then
              apt-get update -qq && apt-get install -y -qq ffmpeg 2>/dev/null || true
            fi
            if [ -x /usr/bin/ffmpeg ]; then
              rm -f /usr/local/bin/ffmpeg 2>/dev/null || true
              hash -r 2>/dev/null || true
              FF="/usr/bin/ffmpeg"
              echo "=== using package manager ffmpeg: /usr/bin/ffmpeg ==="
            elif command -v ffmpeg &> /dev/null; then
              FF=$(command -v ffmpeg)
              echo "=== using existing ffmpeg: ${FF} ==="
            else
              echo "=== downloading static ffmpeg from GitHub ==="
              curl -sL --connect-timeout 10 --max-time 30 \
                "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
                -o /tmp/ffmpeg.tar.xz 2>/dev/null || true
              if [ -f /tmp/ffmpeg.tar.xz ] && [ -s /tmp/ffmpeg.tar.xz ]; then
                tar -xf /tmp/ffmpeg.tar.xz -C /tmp/
                cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg 2>/dev/null || true
                rm -rf /tmp/ffmpeg.tar.xz /tmp/ffmpeg-master-latest-linux64-gpl
              fi
              chmod +x /usr/local/bin/ffmpeg 2>/dev/null || true
              FF="/usr/local/bin/ffmpeg"
              echo "=== using static ffmpeg (no libass, subtitle rendering disabled) ==="
            fi
            write_env_line "FFMPEG_PATH" "${FF}"
            "${FF}" -version 2>&1 | head -1 || true

            # ===== 阶段 4: 构建 =====
            set +e
            echo "=== npm install ==="
            npm install --prefer-offline --no-audit --no-fund --ignore-scripts
            INSTALL_EXIT=$?
            if [ $INSTALL_EXIT -eq 0 ]; then
              rm -rf .next.old 2>/dev/null || true
              if [ -d .next ]; then
                mv .next .next.old
              fi
              echo "=== npm run build ==="
              npm run build
              BUILD_EXIT=$?
              if [ $BUILD_EXIT -eq 0 ]; then
                rm -rf .next.old 2>/dev/null || true
              else
                rm -rf .next 2>/dev/null || true
                if [ -d .next.old ]; then
                  mv .next.old .next
                fi
              fi
            else
              BUILD_EXIT=$INSTALL_EXIT
            fi

            # ===== 阶段 5: 重启服务 =====
            if [ $BUILD_EXIT -eq 0 ]; then
              echo "=== build success, restarting lingji ==="
              echo "=== diagnostics ==="
              echo "Chunks count: $(ls .next/static/chunks/*.js 2>/dev/null | wc -l)"
              echo "Webpack chunks:"
              ls -la .next/static/chunks/webpack-*.js 2>/dev/null || echo "  NONE FOUND"
              echo "App layout/page chunks:"
              ls -la .next/static/chunks/app/layout-*.js .next/static/chunks/app/login/page-*.js 2>/dev/null || echo "  NONE FOUND"
              echo "Build ID: $(cat .next/BUILD_ID 2>/dev/null || echo 'no BUILD_ID')"
              df -h / | tail -1
              # 先停 systemd 服务（防止 Restart=always 自动重启）
              systemctl stop lingji 2>/dev/null || true
              sleep 1
              # 显示所有占用 3000 端口的进程
              echo "=== processes on port 3000 (before kill) ==="
              ss -tlnp 'sport = :3000' 2>/dev/null || ss -tlnp | grep 3000 || echo "  none"
              # 反复杀，确保全清（可能有多个进程监听）
              for i in 1 2 3; do
                fuser -k 3000/tcp 2>/dev/null && echo "  killed (round $i)" || echo "  none to kill (round $i)"
                sleep 1
              done
              # 再次确认
              echo "=== processes on port 3000 (after kill) ==="
              ss -tlnp 'sport = :3000' 2>/dev/null || ss -tlnp | grep 3000 || echo "  none"
              # 手动以 deploy 用户运行 next start 查看错误
              echo "=== manual next start (as deploy user) ==="
              timeout 10 su - deploy -c "cd /var/www/lingji && /usr/bin/node node_modules/next/dist/bin/next start" 2>&1 || true
              echo "=== manual start exit: $? ==="
              # 确保端口再次释放
              fuser -k 3000/tcp 2>/dev/null || true
              sleep 1
              echo "=== port 3000 before systemd start ==="
              ss -tlnp 'sport = :3000' 2>/dev/null || ss -tlnp | grep 3000 || echo "  none"
              # 启动服务
              echo "=== starting lingji via systemd ==="
              systemctl start lingji
              sleep 5
              # 验证
              if systemctl is-active --quiet lingji; then
                echo "=== lingji service is active ==="
              else
                echo "=== WARNING: lingji service not active ==="
                systemctl status lingji 2>&1 || true
              fi
              echo "=== port 3000 final ==="
              ss -tlnp 'sport = :3000' 2>/dev/null || ss -tlnp | grep 3000 || echo "  nothing on port 3000"
              # 确保 nginx 也刷新
              nginx -s reload 2>/dev/null || true
              echo "=== nginx reloaded ==="
            else
              echo "=== build failed (exit $BUILD_EXIT), keeping previous build ==="
              systemctl start lingji
            fi

            # 安装 crontab
            chmod +x scripts/cron-runner.sh
            crontab scripts/ecs-crontab.txt
            echo "=== crontab installed ==="
            crontab -l
          command_timeout: 20m
