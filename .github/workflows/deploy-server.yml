name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install --no-audit --no-fund
          ls node_modules/tailwindcss || npm install tailwindcss@^3.4.0
          NODE_ENV=production npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Package
        run: |
          mkdir deploy-pkg
          cp -r .next public package.json package-lock.json next.config.mjs deploy-pkg/
          cd deploy-pkg
          npm ci --omit=dev --prefer-offline --no-audit --no-fund
          cd ..
          tar czf deploy.tar.gz deploy-pkg

      - name: Transfer to ECS
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          cat deploy.tar.gz | ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cat > /opt/deploy.tar.gz"

      - name: Restart on ECS
        run: |
          echo "${{ secrets.SERVER_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} '
            set -e
            swapon /swapfile 2>/dev/null || true

            cd /opt
            rm -rf deploy-pkg lingji-new 2>/dev/null || true
            tar xzf deploy.tar.gz
            rm -f deploy.tar.gz

            cat > deploy-pkg/.env.local << ENVEOF
            DASHSCOPE_API_KEY=${{ secrets.DASHSCOPE_API_KEY }}
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            ARK_API_KEY=${{ secrets.ARK_API_KEY }}
            VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}
            VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            ENVEOF

            if [ -d /opt/lingji ]; then
              rm -rf /opt/lingji-old 2>/dev/null || true
              mv /opt/lingji /opt/lingji-old
            fi
            mv deploy-pkg /opt/lingji

            pm2 stop lingji 2>/dev/null || true
            pm2 delete lingji 2>/dev/null || true
            cd /opt/lingji
            pm2 start node_modules/next/dist/bin/next --name lingji -- start -p 3000
            pm2 save
            echo "=== deploy OK ==="
            pm2 list
          '
