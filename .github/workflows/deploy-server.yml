name: Deploy to Alibaba Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

# 防止并发部署相互覆盖 node_modules
concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/lingji
            # 强制同步远程最新代码
            echo "=== git remote ==="
            git remote -v
            echo "=== git fetch + reset ==="
            git fetch origin main
            git reset --hard origin/main
            echo "=== git log ==="
            git log --oneline -5
            echo "=== page-content.tsx key lines ==="
            grep -n 'rows={10}\|fullText\|minHeight: 100' src/app/ai/copywriting/page-content.tsx || echo "WARNING: key changes NOT found!"
            # 同步 env var（运行时敏感配置，不存在则追加）
            grep -q "^VOLC_TTS_APP_ID=" .env.local && sed -i "s#^VOLC_TTS_APP_ID=.*#VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}#" .env.local || echo "VOLC_TTS_APP_ID=${{ secrets.VOLC_TTS_APP_ID }}" >> .env.local
            grep -q "^VOLC_TTS_ACCESS_TOKEN=" .env.local && sed -i "s#^VOLC_TTS_ACCESS_TOKEN=.*#VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}#" .env.local || echo "VOLC_TTS_ACCESS_TOKEN=${{ secrets.VOLC_TTS_ACCESS_TOKEN }}" >> .env.local
            grep -q "^CRON_SECRET=" .env.local && sed -i "s#^CRON_SECRET=.*#CRON_SECRET=${{ secrets.CRON_SECRET }}#" .env.local || echo "CRON_SECRET=${{ secrets.CRON_SECRET }}" >> .env.local
            # 先停应用释放内存，清理旧构建缓存
            pm2 stop lingji
            rm -rf node_modules .next
            npm install
            npm run build
            pm2 start lingji --update-env
            pm2 save
            # 安装 crontab 定时任务
            chmod +x scripts/cron-runner.sh
            crontab scripts/ecs-crontab.txt
            echo "=== crontab installed ==="
            crontab -l
