name: Check Hotspots (Backup)

on:
  workflow_dispatch: # 手动触发，ECS crontab 是主力

jobs:
  check-hotspots:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hotspot check via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/lingji
            bash scripts/cron-runner.sh /api/cron/check-hotspots
