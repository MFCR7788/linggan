<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵集 - 开发登录</title>
  <style>
    body {
      margin: 0; padding: 0;
      background: #0A1629;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px; padding: 40px 32px;
      text-align: center; max-width: 360px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { color: #fff; font-size: 18px; margin: 0 0 8px; }
    p { color: #9CA3AF; font-size: 13px; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>正在登录开发环境...</h2>
    <p>自动设置认证凭据并跳转首页</p>
  </div>
  <script>
    (function() {
      var DEV_USER_ID = '11111111-1111-1111-1111-111111111111';
      var DAYS = 7 * 24 * 60 * 60;
      document.cookie = 'dev_auth_secret=lingji-dev; path=/; max-age=' + DAYS + '; sameSite=lax';
      document.cookie = 'dev_user_id=' + DEV_USER_ID + '; path=/; max-age=' + DAYS + '; sameSite=lax';
      try {
        localStorage.setItem('dev_user', JSON.stringify({
          id: DEV_USER_ID,
          phone: '13800000000',
          username: '开发用户'
        }));
      } catch(e) {}
      // 等 cookie 生效后跳转
      setTimeout(function() {
        window.location.href = '/home';
      }, 500);
    })();
  </script>
</body>
</html>
