<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="favSpark" x1="32" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="64" height="64" rx="16" fill="#0F1D33"/>

  <!-- 简化菱形火花（小尺寸可见） -->
  <g transform="translate(32,31)">
    <!-- 光晕 -->
    <ellipse cx="0" cy="0" rx="26" ry="26" fill="#8B5CF6" opacity="0.18"/>
    <!-- 菱形 -->
    <rect x="-18" y="-18" width="36" height="36" rx="9" fill="url(#favSpark)" transform="rotate(45)"/>
    <!-- 内核亮点 -->
    <circle cx="0" cy="0" r="6" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- 小节点 -->
  <g fill="url(#favSpark)" opacity="0.6">
    <circle cx="8" cy="8" r="3.5"/>
    <circle cx="56" cy="8" r="3.5"/>
    <circle cx="8" cy="52" r="3.5"/>
    <circle cx="56" cy="52" r="3.5"/>
  </g>
</svg>
