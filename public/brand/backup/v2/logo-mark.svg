<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="bars" x1="120" y1="0" x2="120" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="70%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- 三横 -->
  <rect x="70" y="58" width="100" height="11" rx="5.5" fill="url(#bars)"/>
  <rect x="62" y="90" width="116" height="11" rx="5.5" fill="url(#bars)" opacity="0.72"/>
  <rect x="54" y="122" width="132" height="11" rx="5.5" fill="url(#bars)" opacity="0.44"/>

  <!-- 星菱 -->
  <g transform="translate(120,166)">
    <circle cx="0" cy="0" r="16" fill="#8B5CF6" opacity="0.15"/>
    <rect x="-9" y="-9" width="18" height="18" rx="4" fill="url(#bars)" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" opacity="0.9"/>
  </g>
